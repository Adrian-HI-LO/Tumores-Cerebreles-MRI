<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análisis de MRI - Sistema de Detección de Tumores Cerebrales</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Mostrar hasta 12 casos (filas) con 3 columnas: MRI, Máscara, Overlay -->
        <main class="cases-grid">
            {% if samples %}
                {% for sample in samples %}
                    <div class="case-row">
                        <div class="case-cell">
                            <h4 class="cell-title">MRI del cerebro</h4>
                            <img src="{{ sample.mri_image }}" alt="MRI {{ loop.index }}">
                        </div>
                        <div class="case-cell">
                            <h4 class="cell-title">Máscara</h4>
                            <img src="{{ sample.mask_image }}" alt="Máscara {{ loop.index }}">
                        </div>
                        <div class="case-cell">
                            <h4 class="cell-title">MRI con máscara</h4>
                            <img src="{{ sample.overlay_image }}" alt="Overlay {{ loop.index }}">
                        </div>
                    </div>
                {% endfor %}
            {% else %}
                <p class="no-images">No hay imágenes disponibles.</p>
            {% endif %}
        </main>
    </div>
</body>
</html>
